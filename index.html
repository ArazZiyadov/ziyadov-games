<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyadov Games | Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --primary: #00f2fe;
            --accent: #00ff88;
            --bg: #050a0f;
            --card-bg: #0a1219;
        }

        body {
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
        }

        /* HEADER */
        header {
            width: 100%; padding: 20px 0; display: flex; justify-content: space-around; 
            align-items: center; border-bottom: 1px solid rgba(0, 242, 254, 0.1);
            position: sticky; top: 0; background: rgba(5, 10, 15, 0.9); backdrop-filter: blur(10px); z-index: 1000;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--primary); letter-spacing: 2px; cursor: pointer; }
        .nav-links a { color: white; text-decoration: none; margin: 0 10px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }

        /* AXTARIŞ QİSİMİ */
        .search-container { width: 90%; max-width: 400px; margin: 20px auto; position: relative; }
        .search-input {
            width: 100%; padding: 12px 20px; border-radius: 20px; border: 1px solid rgba(0,242,254,0.3);
            background: var(--card-bg); color: white; font-family: 'Rajdhani'; outline: none;
        }

        /* OYUNLAR SİYAHISI */
        .container { width: 95%; max-width: 450px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; box-sizing: border-box; }
        .game-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(0,242,254,0.1); transition: 0.3s; cursor: pointer;
        }
        .game-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,242,254,0.2); }
        .game-thumb { width: 100%; height: 110px; object-fit: cover; }
        .game-info { padding: 10px; text-align: center; }
        .game-info h3 { margin: 0; font-size: 14px; font-family: 'Orbitron'; color: #fff; }

        /* FULLSCREEN OVERLAY (Ayrı səyfə kimi açılanlar) */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; flex-direction: column; align-items: center;
        }
        .overlay-header {
            width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { background: #ff4400; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-family: 'Orbitron'; cursor: pointer; }

        /* THEME SEÇİMİ */
        .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .theme-btn { width: 100px; height: 100px; border-radius: 20px; border: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">ZIYADOV</div>
        <div class="nav-links">
            <a onclick="showSection('themes')">THEMELƏR</a>
            <a onclick="showSection('support')" style="color: var(--accent);">DƏSTƏK</a>
        </div>
    </header>

    <div class="search-container">
        <input type="text" class="search-input" placeholder="Oyun axtar..." onkeyup="filterGames(this.value)">
    </div>

    <div id="game-list" class="container">
        </div>

    <div id="view-layer" class="overlay">
        <div class="overlay-header">
            <h2 id="view-title" style="font-family:'Orbitron'; font-size:16px;">YÜKLƏNİR...</h2>
            <button class="close-btn" onclick="closeView()">BAĞLA</button>
        </div>
        <iframe id="view-frame" src=""></iframe>
    </div>

    <script>
        // --- BU HİSSƏYƏ OYUNLARI TOXUNMADAN ƏLAVƏ ET ---
        const oyunData = [
            { id: 1, ad: "Core Clicker", sekil: "https://img.freepik.com/free-vector/neon-lightning-bolt_52683-39832.jpg", fayl: "clicker.html" },
            { id: 2, ad: "Neon Snake", sekil: "https://img.freepik.com/free-vector/snake-pixel-art-style_23-2148523555.jpg", fayl: "snake.html" },
            { id: 3, ad: "Subway Surfer", sekil: "https://img.freepik.com/free-vector/runner-silhouette-concept_23-2148622115.jpg", fayl: "surfer.html" }
        ];

        // Oyunları Ekrana Çıxar
        function initGames(list) {
            const container = document.getElementById('game-list');
            container.innerHTML = "";
            list.forEach(game => {
                container.innerHTML += `
                    <div class="game-card" onclick="openContent('${game.fayl}', '${game.ad}')">
                        <img src="${game.sekil}" class="game-thumb">
                        <div class="game-info"><h3>${game.ad}</h3></div>
                    </div>
                `;
            });
        }

        // Axtarış Funksiyası
        function filterGames(val) {
            const filtered = oyunData.filter(g => g.ad.toLowerCase().includes(val.toLowerCase()));
            initGames(filtered);
        }

        // Pəncərə Açma
        function openContent(url, title) {
            document.getElementById('view-frame').src = url;
            document.getElementById('view-title').innerText = title;
            document.getElementById('view-layer').style.display = 'flex';
        }

        function closeView() {
            document.getElementById('view-layer').style.display = 'none';
            document.getElementById('view-frame').src = "";
        }

        // Digər Bölmələr
        function showSection(type) {
            if(type === 'support') openContent('support.html', 'DƏSTƏK OL');
            if(type === 'themes') openContent('themes.html', 'THEME SEÇİMİ');
        }

        window.onload = () => initGames(oyunData);
    </script>
</body>
</html>
