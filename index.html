<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyadov Game Portal</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1a1a2e, #16213e, #0f3460);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            color: white;
            overflow: hidden;
        }
        h1 {
            text-shadow: 0 0 20px #00f2fe;
            margin-bottom: 50px;
            font-size: 3rem;
            letter-spacing: 5px;
        }
        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 80%;
            max-width: 800px;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 242, 254, 0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(0, 242, 254, 0.1);
            border-color: #00f2fe;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.4);
        }
        .game-card h2 { margin: 10px 0; font-size: 1.5rem; }
        .game-card p { font-size: 0.9rem; color: #8b949e; }
        .icon { font-size: 50px; margin-bottom: 10px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <h1>OYUN PORTALI</h1>

    <div class="menu">
        <a href="snake.html" class="game-card">
            <div class="icon">🐍</div>
            <h2>SNAKE 3D</h2>
            <p>Mənzərəli və rəqiblərlə dolu klassik ilan oyunu.</p>
        </a>

        <a href="surfer.html" class="game-card">
            <div class="icon">🏃‍♂️</div>
            <h2>SUBWAY SURFER</h2>
            <p>Maneələrdən qaç, qızılları yığ və sürətlən!</p>
        </a>

        <a href="#" class="game-card" style="opacity: 0.5; cursor: not-allowed;">
            <div class="icon">🚀</div>
            <h2>YAXINDA</h2>
            <p>Yeni 3D kosmos macərası hazırlanır...</p>
        </a>
    </div>

</body>
</html>
