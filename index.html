<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyadov Games | Ana Səhifə</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card-bg: #0d1117; --accent: #00f2fe; --secondary: #4facfe; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(0, 242, 254, 0.08) 0%, transparent 70%); z-index: -1; }
        
        nav { padding: 15px 5%; background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: bold; background: linear-gradient(90deg, var(--accent), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; letter-spacing: 2px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-size: 13px; font-weight: 700; text-transform: uppercase; transition: 0.3s; letter-spacing: 1px; }
        .nav-links a:hover { color: var(--accent); }

        header { padding: 80px 20px; text-align: center; }
        header h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 8vw, 3.5rem); margin: 0; letter-spacing: 5px; text-transform: uppercase; }
        header p { color: #8b949e; margin-top: 15px; font-size: 1.1rem; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 80px; }
        .section-header { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; margin: 40px 0; color: var(--accent); display: flex; align-items: center; gap: 15px; }
        .section-header::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(90deg, var(--accent), transparent); }
        
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .game-card { background: var(--card-bg); border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); padding: 40px; transition: 0.4s; text-align: center; position: relative; }
        .game-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 15px 35px rgba(0, 242, 254, 0.1); }
        .game-icon { font-size: 50px; color: var(--accent); margin-bottom: 20px; text-shadow: 0 0 15px var(--accent); }
        .game-card h3 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; margin: 10px 0; }
        .game-card p { color: #8b949e; line-height: 1.6; font-size: 0.95rem; }
        
        .play-btn { display: block; background: linear-gradient(90deg, var(--accent), var(--secondary)); color: #000; padding: 16px; border-radius: 18px; text-decoration: none; font-weight: 800; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .play-btn:hover { filter: brightness(1.1); box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3); }
        
        footer { padding: 40px; text-align: center; color: #484f58; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <nav>
        <a href="index.html" class="logo">ZIYADOV GAMES</a>
        <div class="nav-links">
            <a href="index.html">Oyunlar</a>
            <a href="destek.html" style="color: #25D366;">Dəstək Ol</a>
        </div>
    </nav>

    <header>
        <h1>ZIYADOV GAMES</h1>
        <p>Azərbaycanın mini oyun portalı</p>
    </header>

    <div class="container">
        <div class="section-header">OYUNLAR SİYAHISI</div>
        <div class="games-grid">
            <div class="game-card">
                <div class="game-icon"><i class="fas fa-bolt"></i></div>
                <h3>Core Clicker</h3>
                <p>Klikləmə sürətini sına və rekord qır!</p>
                <a href="clicker.html" class="play-btn">İNDİ OYNA</a>
            </div>
            <div class="game-card">
                <div class="game-icon"><i class="fas fa-dragon"></i></div>
                <h3>Neon Snake</h3>
                <p>Klassik ilan oyunu modern dizaynda.</p>
                <a href="snake.html" class="play-btn">İNDİ OYNA</a>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Ziyadov Games. Bütün hüquqlar qorunur.</footer>
</body>
</html>
