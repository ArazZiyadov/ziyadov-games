<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyadov Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        body {
            margin: 0; padding: 0; background-color: #050a0f; color: white;
            font-family: 'Rajdhani', sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        header {
            width: 100%; padding: 20px 0; display: flex; justify-content: space-around; align-items: center;
            border-bottom: 1px solid rgba(0, 242, 254, 0.1); position: sticky; top: 0; background: #050a0f; z-index: 100;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; color: #00f2fe; letter-spacing: 2px; text-decoration: none; }
        .nav-links a { color: white; text-decoration: none; margin: 0 10px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .nav-links .support-link { color: #00ff88; }

        .hero { text-align: center; margin-top: 20px; }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: 24px; letter-spacing: 3px; margin: 0; }

        .game-container { width: 95%; max-width: 450px; display: flex; flex-direction: column; gap: 25px; padding: 20px 0 100px 0; }
        
        /* OYUN KARTI STİLİ */
        .card {
            background: #0a1219; border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s;
        }
        .game-img {
            width: 100%; height: 180px; background-size: cover; background-position: center;
            position: relative; border-bottom: 2px solid #00f2fe;
        }
        .card-content { padding: 15px; text-align: left; }
        .card h2 { font-family: 'Orbitron', sans-serif; font-size: 18px; margin: 5px 0; color: #00f2fe; }
        
        /* LIKE VƏ REYTİNQ BÖLMƏSİ */
        .interaction-bar {
            display: flex; align-items: center; gap: 15px; margin-top: 10px; padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .like-btn { color: #00ff88; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .dislike-btn { color: #ff4444; cursor: pointer; font-size: 14px; }
        .rating-text { color: #8b949e; font-size: 12px; margin-left: auto; }

        /* YORUM BÖLMƏSİ */
        .comment-box {
            margin-top: 10px; display: flex; gap: 5px;
        }
        .comment-input {
            flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 5px;
            padding: 8px; color: white; font-size: 12px;
        }
        .send-btn { background: #00f2fe; border: none; border-radius: 5px; padding: 0 10px; cursor: pointer; color: #050a0f; }

        .btn-play {
            width: 100%; background: linear-gradient(90deg, #00f2fe, #4facfe);
            border: none; padding: 12px; border-radius: 10px; color: #050a0f;
            font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .full-screen-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050a0f; z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        .support-box { border: 2px solid #00ff88; background: #0a1914; border-radius: 30px; padding: 30px; max-width: 400px; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo" onclick="showView('main-portal')">ZIYADOV GAMES</a>
        <div class="nav-links">
            <a onclick="showView('main-portal')">OYUNLAR</a>
            <a onclick="showView('support-view')" class="support-link">DƏSTƏK OL</a>
        </div>
    </header>

    <div id="main-portal" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="hero">
            <h1>PORTAL OYUNLARI</h1>
        </div>

        <div class="game-container">
            
            <div class="card">
                <div class="game-img" style="background-image: url('snake.jpg');"></div>
                <div class="card-content">
                    <h2>Snake 3D</h2>
                    <div class="interaction-bar">
                        <div class="like-btn" onclick="this.innerHTML='👍 96%'">👍 95%</div>
                        <div class="dislike-btn">👎</div>
                        <div class="rating-text">125 Levels</div>
                    </div>
                    <div class="comment-box">
                        <input type="text" class="comment-input" placeholder="Rəy yazın...">
                        <button class="send-btn">✈</button>
                    </div>
                    <button class="btn-play" onclick="location.href='snake.html'">İNDİ OYNA</button>
                </div>
            </div>

            <div class="card">
                <div class="game-img" style="background-image: url('surfer.jpg');"></div>
                <div class="card-content">
                    <h2>Subway Surfer</h2>
                    <div class="interaction-bar">
                        <div class="like-btn" onclick="this.innerHTML='👍 92%'">👍 91%</div>
                        <div class="dislike-btn">👎</div>
                        <div class="rating-text">High Speed</div>
                    </div>
                    <div class="comment-box">
                        <input type="text" class="comment-input" placeholder="Rəy yazın...">
                        <button class="send-btn">✈</button>
                    </div>
                    <button class="btn-play" onclick="location.href='surfer.html'">İNDİ OYNA</button>
                </div>
            </div>

            <div class="card">
                <div class="game-img" style="background-image: url('clicker.jpg'); background-color: #00f2fe22;"></div>
                <div class="card-content">
                    <h2>Core Clicker</h2>
                    <div class="interaction-bar">
                        <div class="like-btn" onclick="this.innerHTML='👍 99%'">👍 98%</div>
                        <div class="dislike-btn">👎</div>
                        <div class="rating-text">Non-stop XP</div>
                    </div>
                    <div class="comment-box">
                        <input type="text" class="comment-input" placeholder="Rəy yazın...">
                        <button class="send-btn">✈</button>
                    </div>
                    <button class="btn-play" onclick="showView('clicker-view')">İNDİ OYNA</button>
                </div>
            </div>

        </div>
    </div>

    <div id="support-view" class="full-screen-overlay">
        <div class="support-box">
            <h2 style="color: #00ff88; font-family: 'Orbitron';">DƏSTƏK OL</h2>
            <p>Salam! Mən <b>Ziyadov</b>. Mən gənc bir gəlişdiriciyəm və bu portalı tək başıma idarə edirəm.</p>
            <button class="btn-play" style="background:#00ff88; color:#050a0f;" onclick="window.open('https://wa.me/994515114568', '_blank')">WHATSAPP: 051 511 45 68</button>
        </div>
        <button onclick="showView('main-portal')" style="background:none; border:1px solid white; color:white; padding:10px; margin-top:20px; border-radius:10px;">GERİ</button>
    </div>

    <script>
        function showView(viewId) {
            document.getElementById('main-portal').style.display = 'none';
            document.getElementById('support-view').style.display = 'none';
            document.getElementById(viewId).style.display = 'flex';
        }
    </script>
</body>
</html>
