<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ziyadov Games Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --primary: #00f2fe;
            --accent: #00ff88;
            --bg: #050a0f;
            --card: #0a1219;
        }

        /* Saytın sağa-sola qaçmasının qarşısını alan əsas nizamlamalar */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: 'Rajdhani', sans-serif;
            width: 100vw; overflow-x: hidden; /* Sağa-sola hərəkəti tam bağlayır */
        }

        /* Üst Menyu */
        header {
            width: 100%; padding: 15px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid rgba(0, 242, 254, 0.1);
            background: rgba(5, 10, 15, 0.95); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 18px; color: var(--primary); font-weight: 700; text-decoration: none; }
        
        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .nav-link { color: var(--accent); font-weight: bold; font-size: 14px; text-decoration: none; cursor: pointer; }

        /* Axtarış Bölməsi */
        .search-bar {
            width: 90%; max-width: 400px; margin: 20px auto;
            display: flex; background: var(--card); border-radius: 15px;
            border: 1px solid rgba(0, 242, 254, 0.2); padding: 5px 15px;
        }
        .search-bar input {
            width: 100%; background: transparent; border: none; color: white;
            padding: 10px; font-family: 'Rajdhani'; outline: none; font-size: 16px;
        }

        /* Oyun Kartları */
        .main-container { width: 100%; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
        
        .game-card {
            background: var(--card); border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(0, 242, 254, 0.1); position: relative;
        }
        .game-banner { width: 100%; height: 140px; background: #16212a; object-fit: cover; }
        
        .card-body { padding: 15px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .game-title { font-family: 'Orbitron', sans-serif; font-size: 18px; color: white; margin: 0; }
        
        .stats { display: flex; gap: 15px; font-size: 14px; color: var(--accent); margin-bottom: 15px; }
        .stats span.like { color: #00ff88; }
        
        .btn-play {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: #050a0f; font-weight: bold; font-family: 'Orbitron'; cursor: pointer;
        }

        /* Fullscreen Overlay (Dəstək və Oyun üçün) */
        #view-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; flex-direction: column;
        }
        .view-header {
            width: 100%; padding: 15px; display: flex; justify-content: space-between;
            align-items: center; background: #0a1219; border-bottom: 1px solid #333;
        }
        #view-frame { flex-grow: 1; border: none; width: 100%; height: 100%; }
        .close-btn { background: #ff4400; color: white; border: none; padding: 8px 18px; border-radius: 8px; font-family: 'Orbitron'; font-weight: bold; }

    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">ZIYADOV GAMES</a>
        <div class="nav-actions">
            <span class="nav-link" onclick="openContent('support.html', 'DƏSTƏK OL')">DƏSTƏK</span>
            <span class="nav-link" style="color:white" onclick="location.reload()">OYUNLAR</span>
        </div>
    </header>

    <div class="search-bar">
        <input type="text" placeholder="Oyunun adını yaz..." onkeyup="searchGame(this.value)">
    </div>

    <div class="main-container" id="game-list">
        </div>

    <div id="view-layer">
        <div class="view-header">
            <span id="view-name" style="font-family:'Orbitron'; color:var(--primary)">YÜKLƏNİR...</span>
            <button class="close-btn" onclick="closeView()">BAĞLA</button>
        </div>
        <iframe id="view-frame" src=""></iframe>
    </div>

    <script>
        const games = [
            { title: "Snake 3D", likes: "95%", levels: "125 Levels", img: "https://img.freepik.com/free-vector/snake-pixel-art-style_23-2148523555.jpg", file: "snake.html" },
            { title: "Subway Surfer", likes: "91%", levels: "High Speed", img: "https://img.freepik.com/free-vector/runner-silhouette-concept_23-2148622115.jpg", file: "surfer.html" },
            { title: "Core Clicker", likes: "98%", levels: "Endless", img: "https://img.freepik.com/free-vector/neon-lightning-bolt_52683-39832.jpg", file: "clicker.html" }
        ];

        function renderGames(data) {
            const container = document.getElementById('game-list');
            container.innerHTML = data.map(g => `
                <div class="game-card">
                    <img src="${g.img}" class="game-banner">
                    <div class="card-body">
                        <div class="card-header">
                            <h2 class="game-title">${g.title}</h2>
                        </div>
                        <div class="stats">
                            <span class="like">👍 ${g.likes}</span>
                            <span style="color:#8b949e">${g.levels}</span>
                        </div>
                        <button class="btn-play" onclick="openContent('${g.file}', '${g.title}')">İNDİ OYNA</button>
                    </div>
                </div>
            `).join('');
        }

        function searchGame(val) {
            const filtered = games.filter(g => g.title.toLowerCase().includes(val.toLowerCase()));
            renderGames(filtered);
        }

        function openContent(url, name) {
            document.getElementById('view-frame').src = url;
            document.getElementById('view-name').innerText = name;
            document.getElementById('view-layer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeView() {
            document.getElementById('view-layer').style.display = 'none';
            document.getElementById('view-frame').src = "";
            document.body.style.overflow = 'auto';
        }

        window.onload = () => renderGames(games);
    </script>
</body>
</html>
