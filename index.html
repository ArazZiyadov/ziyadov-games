<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziyadov Games Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050a0f;
            background-image: radial-gradient(circle at center, #0a192f 0%, #050a0f 100%);
            color: white;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-bottom: 1px solid rgba(0, 242, 254, 0.1);
        }

        .logo { font-weight: 700; color: #00f2fe; letter-spacing: 2px; }
        .nav-links a { color: white; text-decoration: none; margin: 0 15px; font-size: 12px; opacity: 0.8; }

        .title-section {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 30px;
        }

        .title-section h1 {
            font-size: 42px;
            margin: 0;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .title-section p {
            color: #00f2fe;
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .divider {
            width: 80%;
            display: flex;
            align-items: center;
            margin: 40px 0;
        }

        .divider-text { color: #00f2fe; padding: 0 20px; font-size: 18px; white-space: nowrap; }
        .line { flex-grow: 1; height: 1px; background: rgba(0, 242, 254, 0.3); }

        .game-list {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(0, 242, 254, 0.2);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            transition: 0.4s;
            position: relative;
            text-decoration: none;
            color: white;
        }

        .game-card:hover {
            border-color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            transform: translateY(-5px);
        }

        .game-card .icon {
            font-size: 40px;
            color: #00f2fe;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px #00f2fe);
        }

        .game-card h2 { margin: 10px 0; font-size: 22px; }
        .game-card p { font-size: 13px; opacity: 0.6; margin-bottom: 20px; }

        .btn-play {
            background: transparent;
            border: 2px solid #00f2fe;
            color: white;
            padding: 12px 40px;
            border-radius: 15px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.2);
            transition: 0.3s;
        }

        .game-card:hover .btn-play {
            background: #00f2fe;
            color: #050a0f;
            box-shadow: 0 0 20px #00f2fe;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ZIYADOV GAMES</div>
        <div class="nav-links">
            <a href="#">OYUNLAR</a>
            <a href="#">DƏSTƏK</a>
        </div>
    </header>

    <div class="title-section">
        <h1>ZIYADOV GAMES</h1>
        <p>Azərbaycanın mini oyun portalı</p>
    </div>

    <div class="divider">
        <div class="line"></div>
        <div class="divider-text">OYUNLAR SİYAHISI</div>
        <div class="line"></div>
    </div>

    <div class="game-list">
        <a href="snake.html" class="game-card">
            <div class="icon">🐍</div>
            <h2>Neon Snake</h2>
            <p>Klassik ilan oyunu modern 3D dizaynda.</p>
            <button class="btn-play">İNDİ OYNA</button>
        </a>

        <a href="surfer.html" class="game-card">
            <div class="icon">🏃‍♂️</div>
            <h2>Core Surfer</h2>
            <p>Maneələrdən qaç və rekorda imza at!</p>
            <button class="btn-play">İNDİ OYNA</button>
        </a>
    </div>

    <div style="margin-bottom: 50px;"></div>

</body>
</html>
