<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Clicker | Ziyadov Games</title>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .game-box { background: #0d1117; padding: 60px; border-radius: 40px; border: 2px solid #00f2fe; box-shadow: 0 0 40px rgba(0,242,254,0.25); }
        h1 { font-family: sans-serif; letter-spacing: 5px; color: #8b949e; }
        #score { font-size: 120px; color: #00f2fe; font-weight: bold; margin: 20px 0; text-shadow: 0 0 20px rgba(0,242,254,0.5); }
        .click-btn { padding: 25px 80px; font-size: 28px; background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; border-radius: 20px; font-weight: 800; cursor: pointer; transition: 0.1s; }
        .click-btn:active { transform: scale(0.92); }
        .back-link { display: block; margin-top: 40px; color: #484f58; text-decoration: none; font-weight: bold; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="game-box">
        <h1>XAL</h1>
        <div id="score">0</div>
        <button class="click-btn" onclick="hit()">KLİKLƏ</button>
        <a href="index.html" class="back-link">← ANA SƏHİFƏYƏ QAYIT</a>
    </div>

    <script>
        let count = 0;
        function hit() {
            count++;
            document.getElementById('score').innerText = count;
        }
    </script>
</body>
</html>
