<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Clicker | Ziyadov Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2fe;
            --secondary: #4facfe;
            --bg: #05070a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
        }

        .stats {
            position: absolute;
            top: 50px;
            text-align: center;
        }

        #score {
            font-size: 80px;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0, 242, 254, 0.3);
        }

        .level-info {
            color: var(--secondary);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .click-area {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #game-obj {
            width: 240px;
            height: 240px;
            object-fit: contain;
            filter: drop-shadow(0 0 30px var(--neon));
            transition: transform 0.05s cubic-bezier(0.1, 0, 0.1, 1);
            user-select: none;
            -webkit-user-drag: none;
        }

        .click-area:active #game-obj {
            transform: scale(0.9) rotate(-3deg);
        }

        .high-score {
            position: absolute;
            bottom: 130px;
            font-size: 14px;
            color: #484f58;
            border-top: 1px solid #161b22;
            padding-top: 10px;
            width: 200px;
            text-align: center;
        }

        #msg {
            position: absolute;
            top: 25%;
            font-size: 20px;
            color: #ff0055;
            text-shadow: 0 0 15px #ff0055;
            font-weight: 900;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
        }

        .back-link {
            position: absolute;
            bottom: 50px;
            color: #8b949e;
            text-decoration: none;
            font-size: 12px;
            border: 1px solid #30363d;
            padding: 10px 30px;
            border-radius: 50px;
        }
    </style>
</head>
<body>

    <div class="glow"></div>
    <div id="msg">MÖHTƏŞƏM! +1 LEVEL</div>

    <div class="stats">
        <p class="level-info">MƏRHƏLƏ <span id="level">1</span></p>
        <h1 id="score">0</h1>
    </div>

    <div class="click-area" onclick="clickAction()">
        <img id="game-obj" src="https://cdn-icons-png.flaticon.com/512/3305/3305432.png" alt="Clicker">
    </div>

    <div class="high-score">ƏN YÜKSƏK: <span id="best">0</span></div>

    <a href="index.html" class="back-link">← GERİ QAYIT</a>

    <script>
        // Danışıq səsini (qız səsini) kod başladığı an bloklayırıq
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            // Brauzerin danışma funksiyasını boş bir funksiya ilə əvəz edirik ki, heç nə deyə bilməsin
            window.speechSynthesis.speak = function() { return; };
        }

        let score = 0;
        let level = 1;
        let best = localStorage.getItem('ziyadovBest') || 0;
        document.getElementById('best').innerText = best;

        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // TIK SƏSİ BURADADIR (BU QALDI)
        function playTik() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function clickAction() {
            initAudio();
            score++;
            document.getElementById('score').innerText = score;
            
            // Tik səsi işləyir
            playTik();

            if(score > best) {
                best = score;
                localStorage.setItem('ziyadovBest', best);
                document.getElementById('best').innerText = best;
            }

            if(score % 20 === 0) {
                level++;
                document.getElementById('level').innerText = level;
                showMsg();
                // Burada heç bir danışıq funksiyası yoxdur
            }
        }

        function showMsg() {
            const m = document.getElementById('msg');
            m.style.opacity = "1";
            m.style.transform = "translateY(-20px)";
            setTimeout(() => {
                m.style.opacity = "0";
                m.style.transform = "translateY(0)";
            }, 1500);
        }
    </script>
</body>
</html>
