<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Core 3D Clicker | Ziyadov Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2fe;
            --secondary: #4facfe;
            --bg: #05070a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .stats {
            position: absolute;
            top: 40px;
            text-align: center;
        }

        #score {
            font-size: 80px;
            font-weight: 900;
            margin: 0;
            text-shadow: 0 0 20px var(--neon);
        }

        .level-info {
            color: var(--secondary);
            font-size: 18px;
            letter-spacing: 2px;
        }

        /* 3D Core Element */
        .core-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .core {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, var(--neon), var(--secondary));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.5), inset 0 0 30px rgba(255,255,255,0.5);
            animation: morph 8s linear infinite, rotate 15s linear infinite;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid white;
        }

        .core:active {
            transform: scale(0.85) rotate(10deg);
        }

        @keyframes morph {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            25% { border-radius: 58% 42% 75% 25% / 76% 46% 54% 24%; }
            50% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }
            75% { border-radius: 33% 67% 58% 42% / 63% 68% 32% 37%; }
            100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .high-score {
            position: absolute;
            bottom: 120px;
            font-size: 14px;
            color: #484f58;
        }

        /* T…ôbrik Mesajƒ± */
        #message {
            position: absolute;
            top: 20%;
            font-size: 24px;
            color: #ff0055;
            font-weight: bold;
            opacity: 0;
            transition: 0.5s;
            text-transform: uppercase;
        }

        .back-btn {
            position: absolute;
            bottom: 40px;
            color: #8b949e;
            text-decoration: none;
            border: 1px solid #30363d;
            padding: 10px 25px;
            border-radius: 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="message">M√ñHT∆è≈û∆èM! +1 LEVEL</div>

    <div class="stats">
        <p class="level-info">LEVEL <span id="level">1</span></p>
        <h1 id="score">0</h1>
    </div>

    <div class="core-container">
        <div class="core" onclick="handleTouch()"></div>
    </div>

    <div class="high-score">REKORD: <span id="best">0</span></div>

    <a href="index.html" class="back-btn">‚Üê PORTALA QAYIT</a>

    <script>
        let score = 0;
        let level = 1;
        let best = localStorage.getItem('ziyadovBest') || 0;
        document.getElementById('best').innerText = best;

        // S…ôs funksiyalarƒ± (Sintezator istifad…ô edirik ki, …ôlav…ô fayla ehtiyac olmasƒ±n)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playClickSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playLevelSound() {
            const msg = new SpeechSynthesisUtterance();
            msg.text = "T…ôbrikl…ôr! Yeni m…ôrh…ôl…ô a√ßƒ±ldƒ±";
            msg.lang = "tr-TR"; // Az…ôrbaycan dilin…ô …ôn yaxƒ±n s…ôs
            window.speechSynthesis.speak(msg);
        }

        function handleTouch() {
            score++;
            document.getElementById('score').innerText = score;
            playClickSound();

            // Rekord yenil…ôm…ô
            if(score > best) {
                best = score;
                localStorage.setItem('ziyadovBest', best);
                document.getElementById('best').innerText = best;
            }

            // Level ke√ßidi (h…ôr 20 xalda bir)
            if(score % 20 === 0) {
                level++;
                document.getElementById('level').innerText = level;
                showLevelMessage();
                playLevelSound();
            }
        }

        function showLevelMessage() {
            const msgDiv = document.getElementById('message');
            msgDiv.style.opacity = "1";
            msgDiv.style.transform = "translateY(-20px)";
            setTimeout(() => {
                msgDiv.style.opacity = "0";
                msgDiv.style.transform = "translateY(0)";
            }, 2000);
        }
    </script>
</body>
</html>
