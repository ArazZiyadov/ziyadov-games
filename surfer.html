<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ziyadov Surfers Pro 3D</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ffeb3b; z-index: 10; font-size: 24px; text-shadow: 0 0 10px #000; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff4400; font-size: 40px; display: none; text-align: center; font-weight: bold; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px; border: 2px solid #ff4400; z-index: 20; }
        
        /* İdarəetmə Paneli */
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid white; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; cursor: pointer; user-select: none; backdrop-filter: blur(5px); }
        .btn:active { background: white; color: black; }
        .jump-btn { background: rgba(0, 242, 254, 0.2); border-color: #00f2fe; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="ui">XAL: <span id="coins">0</span></div>
    <div id="msg">OYUN BİTDİ!<br><span style="font-size: 20px; color: white;">Yenidən başlamaq üçün toxun</span></div>

    <div class="controls">
        <div class="btn" onclick="moveLane(-1)">←</div>
        <div class="btn jump-btn" onclick="jump()">↑</div>
        <div class="btn" onclick="moveLane(1)">→</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player;
        let coins = 0, speed = 0.5, isGameOver = false;
        let currentLane = 0; 
        let verticalVel = 0;
        let isJumping = false;
        
        let objects = []; // Maneələr, qatarlar və qızıllar
        const lanes = [-3.5, 0, 3.5];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x5eb1ff);
            scene.fog = new THREE.Fog(0x5eb1ff, 20, 80);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 12);
            camera.lookAt(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // İşıqlandırma
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // Sonsuz Yol Görünüşü
            const roadGeo = new THREE.PlaneGeometry(12, 2000);
            const roadMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // Karakter (Daha cəlbedici model)
            const playerGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.8, 0.8), new THREE.MeshPhongMaterial({ color: 0x00f2fe }));
            body.position.y = 0.9;
            playerGroup.add(body);
            player = playerGroup;
            scene.add(player);

            // İlkin obyektləri yarat
            for(let i=0; i<15; i++) {
                spawnEverything(-i * 30 - 40);
            }

            window.addEventListener('click', () => { if(isGameOver) location.reload(); });
            
            // Klaviatura dəstəyi
            window.addEventListener('keydown', (e) => {
                if(e.key === "ArrowLeft") moveLane(-1);
                if(e.key === "ArrowRight") moveLane(1);
                if(e.key === "ArrowUp" || e.key === " ") jump();
            });
        }

        function spawnEverything(z) {
            const type = Math.random();
            const lane = lanes[Math.floor(Math.random() * 3)];

            if(type > 0.7) { // QATAR (Böyük maneə)
                const train = new THREE.Mesh(
                    new THREE.BoxGeometry(3, 4, 15),
                    new THREE.MeshPhongMaterial({ color: 0x555555 })
                );
                train.position.set(lane, 2, z);
                train.userData = { type: 'obstacle' };
                scene.add(train);
                objects.push(train);
            } else if(type > 0.3) { // BARİER (Alçaq maneə - tullanmaq olar)
                const barrier = new THREE.Mesh(
                    new THREE.BoxGeometry(3, 1.2, 0.5),
                    new THREE.MeshPhongMaterial({ color: 0xff4400 })
                );
                barrier.position.set(lane, 0.6, z);
                barrier.userData = { type: 'obstacle' };
                scene.add(barrier);
                objects.push(barrier);
            }

            // Həmişə qızıl əlavə et
            const coin = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.5, 0.1, 16),
                new THREE.MeshPhongMaterial({ color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 0.3 })
            );
            coin.rotation.z = Math.PI / 2;
            coin.position.set(lanes[Math.floor(Math.random() * 3)], 1.5, z - 10);
            coin.userData = { type: 'coin' };
            scene.add(coin);
            objects.push(coin);
        }

        function moveLane(dir) {
            if(isGameOver) return;
            currentLane = Math.max(-1, Math.min(1, currentLane + dir));
        }

        function jump() {
            if(isGameOver || isJumping) return;
            isJumping = true;
            verticalVel = 0.3;
        }

        function animate() {
            if(isGameOver) return;
            requestAnimationFrame(animate);

            // Fizika (Tullanma)
            if(isJumping) {
                player.position.y += verticalVel;
                verticalVel -= 0.015; // Qravitasiya
                if(player.position.y <= 0) {
                    player.position.y = 0;
                    isJumping = false;
                }
            }

            // Sola-sağa hərəkət (Yumşaq)
            player.position.x = THREE.MathUtils.lerp(player.position.x, lanes[currentLane+1], 0.15);

            // Obyektlərin hərəkəti
            objects.forEach((obj, idx) => {
                obj.position.z += speed;

                // Toqquşma
                const dist = player.position.distanceTo(obj.position);
                if(dist < 1.8) {
                    if(obj.userData.type === 'obstacle') {
                        // Əgər barierin üstündə deyilsə, oyun bitsin
                        if(player.position.y < obj.position.y + 0.5) gameOver();
                    } else if(obj.userData.type === 'coin') {
                        coins += 10;
                        document.getElementById('coins').innerText = coins;
                        obj.position.z = 20; // Silmək üçün arxaya at
                        speed += 0.0005; 
                    }
                }

                // Obyekt arxada qaldıqda yenidən qabağa at (Sonsuz dövr)
                if(obj.position.z > 20) {
                    obj.position.z = -250;
                    obj.position.x = lanes[Math.floor(Math.random() * 3)];
                }
            });

            renderer.render(scene, camera);
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('msg').style.display = 'block';
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
