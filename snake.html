<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Snake 3D | Ziyadov Games</title>
    <style>
        body { margin: 0; background: #87ceeb; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #fps { position: absolute; top: 20px; right: 20px; color: #00ff00; font-family: monospace; z-index: 10; }
        
        /* Joystick Area */
        #joy-container {
            position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px;
            background: rgba(255,255,255,0.1); border-radius: 50%; backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2); touch-action: none;
        }
        #joy-stick {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            background: radial-gradient(circle, #fff, #4facfe); border-radius: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0;">XAL: <span id="score">0</span></h2>
    </div>
    <div id="fps">FPS: 0</div>

    <div id="joy-container"><div id="joy-stick"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player = [], enemies = [], foods = [], environment = [];
        let score = 0, moveDir = new THREE.Vector3(0.2, 0, 0);
        let lastTime = 0, frameCount = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa3d1ff);
            scene.fog = new THREE.Fog(0xa3d1ff, 10, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(10, 50, 10);
            scene.add(sun);

            // Infinite Ground (Moves with player)
            const groundGeo = new THREE.PlaneGeometry(2000, 2000);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x4CAF50 });
            this.ground = new THREE.Mesh(groundGeo, groundMat);
            this.ground.rotation.x = -Math.PI / 2;
            scene.add(this.ground);

            // Decoration: Trees & Rocks
            for(let i=0; i<200; i++) spawnDecoration();
            
            // Start with 3 spheres
            spawnPlayer(3);

            // Rivals
            for(let i=0; i<5; i++) spawnEnemy();

            // Lots of Food
            for(let i=0; i<30; i++) spawnFood();

            setupJoystick();
        }

        function spawnDecoration() {
            const x = (Math.random() - 0.5) * 500;
            const z = (Math.random() - 0.5) * 500;
            const type = Math.random();
            
            if(type > 0.3) { // Tree
                const tree = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1.5), new THREE.MeshPhongMaterial({color: 0x5d3a1a}));
                const leaf = new THREE.Mesh(new THREE.ConeGeometry(1, 2.5, 8), new THREE.MeshPhongMaterial({color: 0x2e7d32}));
                leaf.position.y = 1.5;
                tree.add(trunk); tree.add(leaf);
                tree.position.set(x, 0.75, z);
                scene.add(tree);
                environment.push(tree);
            } else { // Mountain/Rock
                const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(Math.random()*3+1), new THREE.MeshPhongMaterial({color: 0x9e9e9e}));
                rock.position.set(x, 0, z);
                scene.add(rock);
                environment.push(rock);
            }
        }

        function spawnPlayer(count) {
            for(let i=0; i<count; i++) {
                const seg = new THREE.Mesh(
                    new THREE.SphereGeometry(0.7, 24, 24),
                    new THREE.MeshPhongMaterial({ color: 0x00d2ff, emissive: 0x00d2ff, emissiveIntensity: 0.2 })
                );
                seg.position.set(-i * 0.8, 0.7, 0);
                scene.add(seg);
                player.push(seg);
            }
        }

        function spawnEnemy() {
            const enemyBody = [];
            const color = 0xff5722;
            const startX = (Math.random()-0.5)*100;
            const startZ = (Math.random()-0.5)*100;
            for(let i=0; i<10; i++) {
                const seg = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), new THREE.MeshPhongMaterial({color: color}));
                seg.position.set(startX, 0.7, startZ);
                scene.add(seg);
                enemyBody.push(seg);
            }
            enemies.push({ body: enemyBody, dir: new THREE.Vector2(0.1, 0.1) });
        }

        function spawnFood() {
            const food = new THREE.Mesh(
                new THREE.SphereGeometry(0.4, 16, 16),
                new THREE.MeshPhongMaterial({ color: 0xffeb3b, emissive: 0xffeb3b })
            );
            food.position.set((Math.random()-0.5)*200, 0.5, (Math.random()-0.5)*200);
            scene.add(food);
            foods.push(food);
        }

        function setupJoystick() {
            const container = document.getElementById('joy-container');
            const stick = document.getElementById('joy-stick');
            let active = false;

            const updateMove = (e) => {
                if(!active) return;
                const touch = e.touches ? e.touches[0] : e;
                const rect = container.getBoundingClientRect();
                const center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
                const dx = touch.clientX - center.x;
                const dy = touch.clientY - center.y;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                const angle = Math.atan2(dy, dx);

                stick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
                
                // Sensitivity control
                moveDir.x = Math.cos(angle) * 0.22;
                moveDir.z = Math.sin(angle) * 0.22;
            };

            container.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchend', () => { active = false; stick.style.transform = 'translate(-50%, -50%)'; });
            window.addEventListener('touchmove', updateMove);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            
            // FPS
            frameCount++;
            if (time - lastTime >= 1000) {
                document.getElementById('fps').innerText = "FPS: " + frameCount;
                frameCount = 0; lastTime = time;
            }

            // Move Player
            for(let i = player.length - 1; i > 0; i--) {
                player[i].position.lerp(player[i-1].position, 0.4);
            }
            player[0].position.add(moveDir);

            // Infinite Ground Follow
            this.ground.position.set(player[0].position.x, 0, player[0].position.z);

            // Camera follow
            const camOffset = new THREE.Vector3(player[0].position.x, 15, player[0].position.z + 20);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(player[0].position);

            // Food collision
            foods.forEach((f, idx) => {
                if(player[0].position.distanceTo(f.position) < 1.5) {
                    scene.remove(f);
                    foods.splice(idx, 1);
                    score += 1;
                    document.getElementById('score').innerText = score;
                    spawnFood();
                    grow();
                }
            });

            // Enemy AI
            enemies.forEach(en => {
                for(let i = en.body.length-1; i>0; i--) en.body[i].position.lerp(en.body[i-1].position, 0.2);
                en.body[0].position.x += en.dir.x;
                en.body[0].position.z += en.dir.y;
                if(Math.random() < 0.05) {
                    en.dir.rotate(Math.random()*0.2);
                }
                if(player[0].position.distanceTo(en.body[0].position) < 2) location.reload();
            });

            // Nature Collision
            environment.forEach(obj => {
                if(player[0].position.distanceTo(obj.position) < 1.8) location.reload();
            });

            renderer.render(scene, camera);
        }

        function grow() {
            const last = player[player.length-1];
            const seg = new THREE.Mesh(
                new THREE.SphereGeometry(0.7, 16, 16),
                new THREE.MeshPhongMaterial({ color: 0x00d2ff })
            );
            seg.position.copy(last.position);
            scene.add(seg);
            player.push(seg);
        }
    </script>
</body>
</html>
