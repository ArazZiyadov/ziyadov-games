<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Snake 3D | Ziyadov Games</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 22px; pointer-events: none; text-shadow: 0 0 10px #00f2fe; z-index: 10; }
        
        /* Analog Joystick Stili */
        #joystick-zone {
            position: absolute; bottom: 50px; left: 50px; width: 150px; height: 150px;
            background: rgba(255, 255, 255, 0.1); border-radius: 50%; backdrop-filter: blur(5px);
            border: 2px solid rgba(0, 242, 254, 0.3); touch-action: none;
        }
        #joystick-stick {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            background: linear-gradient(135deg, #00f2fe, #4facfe); border-radius: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 0 20px #00f2fe;
        }
        #back { position: absolute; top: 20px; right: 20px; color: #fff; text-decoration: none; background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 20px; z-index: 10; font-size: 14px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="ui">XAL: <span id="score">0</span></div>
    <a href="index.html" id="back">PORTALA QAYIT</a>

    <div id="joystick-zone">
        <div id="joystick-stick"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, snake = [], food, trees = [];
        let score = 0;
        let moveDir = new THREE.Vector3(0.2, 0, 0);
        const worldSize = 100; // Çox böyük xəritə

        // Joystick Dəyişənləri
        const zone = document.getElementById('joystick-zone');
        const stick = document.getElementById('joystick-stick');
        let stickActive = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Göy üzü
            scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio); // 120 FPS üçün
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // İşıq (Günəş)
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(10, 20, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 0.8));

            // Realistik Otlu Zəmin
            const groundGeo = new THREE.PlaneGeometry(worldSize * 2, worldSize * 2);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x2d5a27 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Ağaclar və Təbiət
            for(let i=0; i<60; i++) {
                createNature();
            }

            // İlanın Başı (Daha real)
            const headGeo = new THREE.BoxGeometry(1, 1, 1.2);
            const headMat = new THREE.MeshPhongMaterial({ color: 0x00f2fe, emissive: 0x00f2fe, emissiveIntensity: 0.5 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 0.5;
            scene.add(head);
            snake.push(head);

            spawnFood();
            setupJoystick();
        }

        function createNature() {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 2), new THREE.MeshPhongMaterial({color: 0x4d2600}));
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.2, 3, 8), new THREE.MeshPhongMaterial({color: 0x1e4d2b}));
            leaves.position.y = 2;
            group.add(trunk); group.add(leaves);
            group.position.set(Math.random()*worldSize - worldSize/2, 1, Math.random()*worldSize - worldSize/2);
            scene.add(group);
            trees.push(group);
        }

        function spawnFood() {
            if(food) scene.remove(food);
            const geo = new THREE.SphereGeometry(0.5, 16, 16);
            const mat = new THREE.MeshPhongMaterial({ color: 0xff0055, emissive: 0xff0055 });
            food = new THREE.Mesh(geo, mat);
            food.position.set(Math.random()*20-10, 0.5, Math.random()*20-10);
            scene.add(food);
        }

        function setupJoystick() {
            const handleMove = (e) => {
                if(!stickActive) return;
                const touch = e.touches ? e.touches[0] : e;
                const rect = zone.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                const angle = Math.atan2(dy, dx);

                stick.style.left = `calc(50% + ${Math.cos(angle)*dist}px)`;
                stick.style.top = `calc(50% + ${Math.sin(angle)*dist}px)`;

                // Hərəkət istiqamətini analog olaraq təyin et
                moveDir.x = Math.cos(angle) * 0.15;
                moveDir.z = Math.sin(angle) * 0.15;
            };

            zone.addEventListener('touchstart', () => stickActive = true);
            window.addEventListener('touchend', () => {
                stickActive = false;
                stick.style.left = '50%'; stick.style.top = '50%';
            });
            window.addEventListener('touchmove', handleMove);
        }

        function animate() {
            requestAnimationFrame(animate);

            // İlanın hərəkəti
            const head = snake[0];
            head.position.add(moveDir);
            head.rotation.y = -Math.atan2(moveDir.z, moveDir.x);

            // Kamera ilanı izləyir (Yumşaq keçid)
            const targetCamPos = new THREE.Vector3(head.position.x, head.position.y + 8, head.position.z + 12);
            camera.position.lerp(targetCamPos, 0.05);
            camera.lookAt(head.position);

            // Yemək yoxlanışı
            if(head.position.distanceTo(food.position) < 1.2) {
                score += 1;
                document.getElementById('score').innerText = score;
                spawnFood();
                addBodyPart();
            }

            // Maneələr (Ağaclar)
            trees.forEach(tree => {
                if(head.position.distanceTo(tree.position) < 1) {
                    location.reload();
                }
            });

            // Bədənin başı izləməsi
            for(let i = snake.length - 1; i > 0; i--) {
                const part = snake[i];
                const prev = snake[i-1];
                part.position.lerp(prev.position, 0.2);
            }

            renderer.render(scene, camera);
        }

        function addBodyPart() {
            const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const mat = new THREE.MeshPhongMaterial({ color: 0x00f2fe });
            const part = new THREE.Mesh(geo, mat);
            const last = snake[snake.length-1];
            part.position.copy(last.position);
            scene.add(part);
            snake.push(part);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
