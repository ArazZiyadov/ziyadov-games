<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Snake 3D Pro | Ziyadov Games</title>
    <style>
        body { margin: 0; background: #87ceeb; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #fps { position: absolute; top: 20px; right: 20px; color: #00ff00; font-family: monospace; z-index: 10; font-weight: bold; }
        
        #joy-container {
            position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px;
            background: rgba(255,255,255,0.1); border-radius: 50%; backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.3); touch-action: none;
        }
        #joy-stick {
            position: absolute; top: 50%; left: 50%; width: 55px; height: 55px;
            background: radial-gradient(circle, #fff, #00f2fe); border-radius: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div id="ui"><h2 style="margin:0;">XAL: <span id="score">0</span></h2></div>
    <div id="fps">FPS: 120</div>

    <div id="joy-container"><div id="joy-stick"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player = [], enemies = [], foods = [], environment = [];
        let score = 0, moveDir = new THREE.Vector3(0.25, 0, 0);
        let lastTime = 0, frameCount = 0;
        const RENDER_DIST = 150;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 10, 150);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Light
            const ambient = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(20, 100, 20);
            scene.add(sun);

            // Ground
            const groundGeo = new THREE.PlaneGeometry(2000, 2000);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x4CAF50 });
            this.ground = new THREE.Mesh(groundGeo, groundMat);
            this.ground.rotation.x = -Math.PI / 2;
            scene.add(this.ground);

            // Start with 3 spheres (As requested)
            for(let i=0; i<3; i++) {
                const seg = createSegment(i === 0 ? 0x00d2ff : 0x00f2fe);
                seg.position.set(-i * 0.8, 0.7, 0);
                player.push(seg);
            }

            // Initial spawns
            for(let i=0; i<80; i++) spawnDecoration();
            for(let i=0; i<40; i++) spawnFood();
            for(let i=0; i<6; i++) spawnEnemyAI();

            setupJoystick();
        }

        function createSegment(color) {
            const seg = new THREE.Mesh(
                new THREE.SphereGeometry(0.7, 24, 24),
                new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.1 })
            );
            scene.add(seg);
            return seg;
        }

        function spawnDecoration() {
            const x = (Math.random() - 0.5) * 400;
            const z = (Math.random() - 0.5) * 400;
            
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, 1.8), new THREE.MeshPhongMaterial({color: 0x5d3a1a}));
            const leaf = new THREE.Mesh(new THREE.ConeGeometry(1.2, 3, 8), new THREE.MeshPhongMaterial({color: 0x1b5e20}));
            leaf.position.y = 1.8;
            tree.add(trunk); tree.add(leaf);
            tree.position.set(x, 0.9, z);
            scene.add(tree);
            environment.push(tree);
        }

        function spawnFood() {
            const food = new THREE.Mesh(
                new THREE.SphereGeometry(0.4, 16, 16),
                new THREE.MeshPhongMaterial({ color: 0xffeb3b, emissive: 0xffeb3b, emissiveIntensity: 0.5 })
            );
            food.position.set((Math.random()-0.5)*300, 0.5, (Math.random()-0.5)*300);
            scene.add(food);
            foods.push(food);
        }

        function spawnEnemyAI() {
            const body = [];
            const startPos = new THREE.Vector3((Math.random()-0.5)*200, 0.7, (Math.random()-0.5)*200);
            const color = new THREE.Color().setHSL(Math.random(), 0.8, 0.5);
            for(let i=0; i<15; i++) {
                const seg = new THREE.Mesh(new THREE.SphereGeometry(0.9, 16, 16), new THREE.MeshPhongMaterial({color: color}));
                seg.position.copy(startPos);
                scene.add(seg);
                body.push(seg);
            }
            enemies.push({ body, dir: new THREE.Vector3(0.12, 0, 0.12) });
        }

        function setupJoystick() {
            const container = document.getElementById('joy-container');
            const stick = document.getElementById('joy-stick');
            let active = false;

            const move = (e) => {
                if(!active) return;
                const touch = e.touches ? e.touches[0] : e;
                const rect = container.getBoundingClientRect();
                const center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
                const dx = touch.clientX - center.x;
                const dy = touch.clientY - center.y;
                const angle = Math.atan2(dy, dx);
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 55);

                stick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
                
                // Joystick Sensitivity
                moveDir.x = Math.cos(angle) * 0.28;
                moveDir.z = Math.sin(angle) * 0.28;
            };

            container.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchend', () => { active = false; stick.style.transform = 'translate(-50%, -50%)'; });
            window.addEventListener('touchmove', move);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            
            // FPS Meter
            frameCount++;
            if (time - lastTime >= 1000) {
                document.getElementById('fps').innerText = "FPS: " + frameCount;
                frameCount = 0; lastTime = time;
            }

            // Player Physics
            const head = player[0];
            for(let i = player.length - 1; i > 0; i--) {
                player[i].position.lerp(player[i-1].position, 0.35);
            }
            head.position.add(moveDir);

            // Ground Follow (Infinite Illusion)
            this.ground.position.set(head.position.x, 0, head.position.z);

            // Camera Smoothing
            const camOffset = new THREE.Vector3(head.position.x, 18, head.position.z + 25);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(head.position);

            // Food Collection
            foods.forEach((f, idx) => {
                if(head.position.distanceTo(f.position) < 1.8) {
                    scene.remove(f);
                    foods.splice(idx, 1);
                    score += 5;
                    document.getElementById('score').innerText = score;
                    spawnFood();
                    grow();
                }
            });

            // Enemy AI Logic
            enemies.forEach(en => {
                for(let i = en.body.length-1; i>0; i--) en.body[i].position.lerp(en.body[i-1].position, 0.15);
                en.body[0].position.add(en.dir);
                if(Math.random() < 0.03) en.dir.applyAxisAngle(new THREE.Vector3(0,1,0), (Math.random()-0.5) * 0.5);
                
                // Dead on collision with enemy
                if(head.position.distanceTo(en.body[0].position) < 2.5) location.reload();
            });

            // Nature Collision (Safe boundaries)
            environment.forEach(obj => {
                if(head.position.distanceTo(obj.position) < 1.8) location.reload();
            });

            renderer.render(scene, camera);
        }

        function grow() {
            const seg = createSegment(0x00f2fe);
            seg.position.copy(player[player.length-1].position);
            player.push(seg);
        }
    </script>
</body>
</html>
