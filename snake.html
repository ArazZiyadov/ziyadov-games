<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Pro | Ziyadov Games</title>
    <style>
        body { margin: 0; background: #1a2a1a; overflow: hidden; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; pointer-events: none; }
        #score { font-size: 32px; font-weight: bold; text-shadow: 0 0 10px rgba(0,242,254,0.8); }
        
        /* Joystick */
        #joy-zone {
            position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
        }
        #joy-stick {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: #00f2fe; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #00f2fe;
        }
    </style>
</head>
<body>

    <div id="ui"><div id="score">0</div></div>
    <div id="joy-zone"><div id="joy-stick"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player = [], foods = [], rivals = [], decoration = [];
        let score = 0, moveDir = new THREE.Vector3(0.2, 0, 0);
        const worldLimit = 150; 

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x4facfe); // Parlaq Səma
            scene.fog = new THREE.Fog(0x4facfe, 20, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // İşıqlandırma (Daha parlaq)
            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(10, 50, 10);
            scene.add(sun);

            // Zəmin (Otluq Dizaynı)
            const groundGeo = new THREE.PlaneGeometry(500, 500);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x348C31 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // 1. Ağaclar və Otlar əlavə edək (Səliqəli sayda)
            for(let i=0; i<100; i++) spawnDecor();

            // 2. İlanı 3 kürə ilə başladaq
            for(let i=0; i<3; i++) {
                addSegment(i === 0);
            }

            // 3. Yeməklər (Hər zaman xəritədə 20 dənə olsun)
            for(let i=0; i<20; i++) spawnFood();

            // 4. Rəqiblər
            for(let i=0; i<3; i++) spawnRival();

            setupJoystick();
        }

        function spawnDecor() {
            const x = (Math.random() - 0.5) * 200;
            const z = (Math.random() - 0.5) * 200;
            
            const group = new THREE.Group();
            // Sadə Ağac
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.5, 0.3), new THREE.MeshPhongMaterial({color: 0x5d3a1a}));
            const top = new THREE.Mesh(new THREE.ConeGeometry(1.2, 3, 6), new THREE.MeshPhongMaterial({color: 0x1b4d1b}));
            top.position.y = 2;
            group.add(trunk); group.add(top);
            group.position.set(x, 0.75, z);
            scene.add(group);
            decoration.push(group);
        }

        function addSegment(isHead = false) {
            const geo = new THREE.SphereGeometry(0.7, 20, 20);
            const mat = new THREE.MeshPhongMaterial({ 
                color: isHead ? 0x00ffff : 0x00d2ff,
                emissive: isHead ? 0x00ffff : 0x000000,
                emissiveIntensity: 0.3
            });
            const segment = new THREE.Mesh(geo, mat);
            if(player.length > 0) {
                const last = player[player.length - 1];
                segment.position.copy(last.position);
            } else {
                segment.position.set(0, 0.7, 0);
            }
            scene.add(segment);
            player.push(segment);
        }

        function spawnFood() {
            const food = new THREE.Mesh(
                new THREE.SphereGeometry(0.4, 12, 12),
                new THREE.MeshPhongMaterial({ color: 0xff0055, emissive: 0xff0055 })
            );
            food.position.set((Math.random()-0.5)*180, 0.5, (Math.random()-0.5)*180);
            scene.add(food);
            foods.push(food);
        }

        function spawnRival() {
            const rivalGeo = new THREE.SphereGeometry(0.8, 12, 12);
            const rivalMat = new THREE.MeshPhongMaterial({ color: 0xffaa00 });
            const rival = new THREE.Mesh(rivalGeo, rivalMat);
            rival.position.set((Math.random()-0.5)*100, 0.8, (Math.random()-0.5)*100);
            scene.add(rival);
            rivals.push({ mesh: rival, dir: new THREE.Vector3(0.1, 0, 0.1) });
        }

        function setupJoystick() {
            const zone = document.getElementById('joy-zone');
            const stick = document.getElementById('joy-stick');
            let active = false;

            const move = (e) => {
                if(!active) return;
                const t = e.touches ? e.touches[0] : e;
                const r = zone.getBoundingClientRect();
                const dx = t.clientX - (r.left + 60);
                const dy = t.clientY - (r.top + 60);
                const angle = Math.atan2(dy, dx);
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);

                stick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
                
                // İlanın dönmə sürəti və həssaslığı
                moveDir.x = Math.cos(angle) * 0.25;
                moveDir.z = Math.sin(angle) * 0.25;
            };

            zone.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchend', () => { active = false; stick.style.transform = 'translate(-50%, -50%)'; });
            window.addEventListener('touchmove', move);
        }

        function animate() {
            requestAnimationFrame(animate);

            // İlan Bədən Hərəkəti
            for(let i = player.length - 1; i > 0; i--) {
                player[i].position.lerp(player[i-1].position, 0.3);
            }
            player[0].position.add(moveDir);

            // Kamera
            camera.position.lerp(new THREE.Vector3(player[0].position.x, 12, player[0].position.z + 18), 0.1);
            camera.lookAt(player[0].position);

            // Yemək Yemə (Toqquşma)
            foods.forEach((f, i) => {
                if(player[0].position.distanceTo(f.position) < 1.5) {
                    scene.remove(f);
                    foods.splice(i, 1);
                    score += 10;
                    document.getElementById('score').innerText = score;
                    addSegment();
                    spawnFood(); // Yemək yeyilən kimi yenisi çıxır
                }
            });

            // Ağaclarla toqquşma
            decoration.forEach(d => {
                if(player[0].position.distanceTo(d.position) < 1.5) location.reload();
            });

            // Rəqiblərin Sadə Hərəkəti
            rivals.forEach(r => {
                r.mesh.position.add(r.dir);
                if(Math.abs(r.mesh.position.x) > 100) r.dir.x *= -1;
                if(player[0].position.distanceTo(r.mesh.position) < 2) location.reload();
            });

            // Dünyanın sonu
            if(Math.abs(player[0].position.x) > 250 || Math.abs(player[0].position.z) > 250) location.reload();

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
