<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake | Ziyadov Games</title>
    <style>
        body { 
            background: #05070a; 
            color: white; 
            text-align: center; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
            touch-action: none; /* Ekranın sürüşməsini bağlayır */
        }
        canvas { 
            border: 4px solid #00f2fe; 
            background: #0d1117; 
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.4);
            max-width: 90vw;
            max-height: 60vh;
        }
        .score-box { font-size: 24px; color: #00f2fe; margin-bottom: 15px; text-shadow: 0 0 10px #00f2fe; }
        .controls-info { margin-top: 15px; color: #484f58; font-size: 14px; }
        .back-btn { margin-top: 20px; color: #8b949e; text-decoration: none; border: 1px solid #30363d; padding: 10px 25px; border-radius: 12px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="score-box">XAL: <span id="scoreVal">0</span></div>
    <canvas id="snakeGame" width="400" height="400"></canvas>
    
    <div class="controls-info">İdarə etmək üçün ekranın tərəflərinə toxun</div>
    
    <a href="index.html" class="back-btn">← GERİ QAYIT</a>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const box = 20;
        let score = 0;
        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
        let d;

        // Klaviatura idarəetməsi
        document.addEventListener("keydown", direction);
        function direction(event) {
            if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d != "DOWN") d = "UP";
            else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        // MOBİL ÜÇÜN: Ekrana toxunma ilə idarəetmə
        canvas.addEventListener("touchstart", function(e) {
            let rect = canvas.getBoundingClientRect();
            let touchX = e.touches[0].clientX - rect.left;
            let touchY = e.touches[0].clientY - rect.top;
            let centerX = rect.width / 2;
            let centerY = rect.height / 2;

            if (Math.abs(touchX - centerX) > Math.abs(touchY - centerY)) {
                if (touchX > centerX && d != "LEFT") d = "RIGHT";
                else if (touchX < centerX && d != "RIGHT") d = "LEFT";
            } else {
                if (touchY > centerY && d != "UP") d = "DOWN";
                else if (touchY < centerY && d != "DOWN") d = "UP";
            }
        });

        function draw() {
            ctx.fillStyle = "#0d1117";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00f2fe" : "#4facfe";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "#ff0055";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById("scoreVal").innerHTML = score;
                food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("Oyun Bitdi! Xal: " + score);
                location.reload();
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        let game = setInterval(draw, 120); // Sürət bir az azaldıldı ki, mobil üçün rahat olsun
    </script>
</body>
</html>
