<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake 3D Adventure | Ziyadov Games</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 10; pointer-events: none; }
        #fps-counter { position: absolute; top: 20px; right: 20px; color: #00ff00; font-size: 14px; z-index: 10; }
        
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px; width: 140px; height: 140px;
            background: rgba(255,255,255,0.05); border: 2px solid rgba(0,242,254,0.1); border-radius: 50%;
        }
        #stick {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: radial-gradient(circle, #00f2fe, #005f73); border-radius: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 0 15px #00f2fe;
        }
        .stats { font-size: 20px; text-shadow: 0 0 10px #00f2fe; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="ui">
        <div class="stats">XAL: <span id="score">0</span></div>
    </div>
    <div id="fps-counter">FPS: 0</div>

    <div id="joystick-zone"><div id="stick"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player = [], enemies = [], foods = [], env = [];
        let score = 0, moveDir = new THREE.Vector3(0.18, 0, 0);
        let lastTime = 0, frameCount = 0;
        const worldSize = 400; // √áox b√∂y√ľk x…ôrit…ô

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa3d1ff); // M…ônz…ôr…ôli S…ôma
            scene.fog = new THREE.Fog(0xa3d1ff, 30, worldSize/2); // Duman m…ônz…ôr…ôni g√∂z…ôll…ôŇüdirir

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 120 FPS d…ôst…ôyi
            document.body.appendChild(renderer.domElement);

            // ńįŇüńĪqlandńĪrma
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(50, 100, 50);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));

            // Z…ômin (MeŇü…ô otu teksturasńĪ)
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(worldSize, worldSize),
                new THREE.MeshPhongMaterial({ color: 0x228b22 }) // T√ľnd yaŇüńĪl ot
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // DAńěLAR V∆Ź MANZ∆ŹR∆Ź
            createMountains();

            // √áoxlu Ańüaclar (800 …ôd…ôd)
            for(let i=0; i<800; i++) spawnTree();

            // ńįlan (Player)
            createSnake(0, 0, true);

            // √áoxlu B√∂y√ľm…ôk HanalarńĪ (15 …ôd…ôd)
            for(let i=0; i<15; i++) spawnFood();

            initJoystick();
        }

        function createMountains() {
            // X…ôrit…ônin d√∂rd t…ôr…ôfin…ô dańülar
            const mtMat = new THREE.MeshPhongMaterial({ color: 0x8b8b8b, emissive: 0x111111 });
            for(let i=0; i<30; i++) {
                const height = Math.random() * 40 + 10;
                const mtGeo = new THREE.ConeGeometry(Math.random()*15+5, height, 4);
                const mt = new THREE.Mesh(mtGeo, mtMat);
                
                // M…ôrk…ôzd…ôn k…ônara yerl…ôŇüdir
                const angle = Math.random() * Math.PI * 2;
                const dist = worldSize / 2 + Math.random() * 20;
                mt.position.set(Math.cos(angle)*dist, height/2, Math.sin(angle)*dist);
                mt.rotation.y = Math.random() * Math.PI;
                scene.add(mt);
            }
        }

        function spawnTree() {
            const tree = new THREE.Group();
            const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 2.5);
            const trunkMat = new THREE.MeshPhongMaterial({color: 0x5d3a1a});
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);

            const topGeo = new THREE.ConeGeometry(1.5, 4, 8);
            const topMat = new THREE.MeshPhongMaterial({color: 0x1e4d2b});
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.y = 2.5;

            tree.add(trunk); tree.add(top);
            
            // X…ôrit…ônin i√ßind…ô yerl…ôŇüdir
            tree.position.set(Math.random()*worldSize - worldSize/2, 1.25, Math.random()*worldSize - worldSize/2);
            scene.add(tree);
            env.push(tree);
        }

        function createSnake(x, z, isPlayer) {
            const color = isPlayer ? 0x00f2fe : 0xff4400;
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.7, 16, 16),
                new THREE.MeshPhongMaterial({color: color, emissive: color, emissiveIntensity: 0.3})
            );
            head.position.set(x, 0.7, z);
            scene.add(head);
            if(isPlayer) player.unshift(head);
        }

        function spawnFood() {
            const food = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 16, 16),
                new THREE.MeshPhongMaterial({color: 0xff0055, emissive: 0xff0055})
            );
            // Ańüaca d…ôym…ôm…ôsi √ľ√ß√ľn yerl…ôŇüdir
            let pos;
            do {
                pos = new THREE.Vector3(Math.random()*(worldSize-10)-worldSize/2+5, 0.5, Math.random()*(worldSize-10)-worldSize/2+5);
            } while(checkNatureCollision(pos));
            
            food.position.copy(pos);
            scene.add(food);
            foods.push(food);
        }

        function checkNatureCollision(pos) {
            for(let obj of env) {
                if(pos.distanceTo(obj.position) < 2) return true;
            }
            return false;
        }

        function initJoystick() {
            const zone = document.getElementById('joystick-zone');
            const stick = document.getElementById('stick');
            let active = false;

            const move = (e) => {
                if(!active) return;
                const touch = e.touches ? e.touches[0] : e;
                const rect = zone.getBoundingClientRect();
                const dx = touch.clientX - (rect.left + 70);
                const dy = touch.clientY - (rect.top + 70);
                const angle = Math.atan2(dy, dx);
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);

                stick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
                moveDir.x = Math.cos(angle) * 0.22;
                moveDir.z = Math.sin(angle) * 0.22;
            };

            zone.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchend', () => { active = false; stick.style.transform = 'translate(-50%, -50%)'; });
            window.addEventListener('touchmove', move);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            
            // FPS
            frameCount++;
            if (time - lastTime >= 1000) {
                document.getElementById('fps-counter').innerText = `FPS: ${frameCount}`;
                frameCount = 0; lastTime = time;
            }

            // ńįlan H…ôr…ôk…ôti (Real ńįlan Effekti)
            const head = player[0];
            const oldPos = head.position.clone();
            head.position.add(moveDir);

            for(let i = player.length - 1; i > 0; i--) {
                player[i].position.lerp(player[i-1].position, 0.35);
            }

            // Kamera M…ônz…ôr…ô Takibi
            const camTarget = new THREE.Vector3(head.position.x, head.position.y + 12, head.position.z + 20);
            camera.position.lerp(camTarget, 0.1);
            camera.lookAt(head.position);

            // Yem…ôk Yem…ô
            foods.forEach((food, index) => {
                if(head.position.distanceTo(food.position) < 1.6) {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    scene.remove(food);
                    foods.splice(index, 1);
                    spawnFood(); // Yenisini yarat
                    growPlayer();
                }
            });

            // T…ôbi…ôtl…ô ToqquŇüma
            env.forEach(obj => {
                if(head.position.distanceTo(obj.position) < 1.8) { location.reload(); }
            });

            // X…ôrit…ôd…ôn k…ônara √ßńĪxma
            if(Math.abs(head.position.x) > worldSize/2 || Math.abs(head.position.z) > worldSize/2) {
                location.reload();
            }

            renderer.render(scene, camera);
        }

        function growPlayer() {
            const last = player[player.length-1];
            const seg = new THREE.Mesh(
                new THREE.SphereGeometry(0.7, 16, 16),
                new THREE.MeshPhongMaterial({color: 0x00f2fe})
            );
            seg.position.copy(last.position);
            scene.add(seg);
            player.push(seg);
        }
    </script>
</body>
</html>
