<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake 3D Ultra | Ziyadov Games</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; z-index: 10; pointer-events: none; }
        #fps-counter { position: absolute; top: 20px; right: 80px; color: #00ff00; font-size: 14px; }
        
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px; width: 140px; height: 140px;
            background: rgba(255,255,255,0.05); border: 2px solid rgba(0,242,254,0.2); border-radius: 50%;
        }
        #stick {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: radial-gradient(circle, #00f2fe, #005f73); border-radius: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 0 15px #00f2fe;
        }
        .stats { font-size: 20px; text-shadow: 0 0 10px #00f2fe; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="ui">
        <div class="stats">XAL: <span id="score">0</span></div>
        <div style="font-size: 12px; color: #4facfe;">MƏRHƏLƏ: <span id="lvl">1</span></div>
    </div>
    <div id="fps-counter">FPS: 0</div>

    <div id="joystick-zone"><div id="stick"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player = [], enemies = [], food, env = [];
        let score = 0, level = 1, moveDir = new THREE.Vector3(0.15, 0, 0);
        let lastTime = 0, frameCount = 0, fps = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa3d1ff);
            scene.fog = new THREE.Fog(0xa3d1ff, 20, 150);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // İşıqlandırma
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(50, 100, 50);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));

            // Sonsuz dünya görünüşü üçün yaşıl zəmin
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(1000, 1000),
                new THREE.MeshPhongMaterial({ color: 0x3e8e41 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Meşə, Evlər və Qayalar
            for(let i=0; i<150; i++) spawnDecoration();

            // İlk İlan (Player)
            createSnake(0, 0, true);

            // Nəhəng Rəqiblər
            for(let i=0; i<5; i++) spawnMegaEnemy();

            spawnFood();
            initJoystick();
        }

        function spawnDecoration() {
            const x = Math.random() * 400 - 200;
            const z = Math.random() * 400 - 200;
            const type = Math.random();

            if(type > 0.4) { // Ağac
                const tree = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 2), new THREE.MeshPhongMaterial({color: 0x5d3a1a}));
                const top = new THREE.Mesh(new THREE.ConeGeometry(1.5, 4, 8), new THREE.MeshPhongMaterial({color: 0x2d5a27}));
                top.position.y = 2.5;
                tree.add(trunk); tree.add(top);
                tree.position.set(x, 1, z);
                scene.add(tree);
                env.push(tree);
            } else if(type > 0.1) { // Qaya
                const rock = new THREE.Mesh(
                    new THREE.DodecahedronGeometry(Math.random()*2),
                    new THREE.MeshPhongMaterial({color: 0x808080})
                );
                rock.position.set(x, 0.5, z);
                scene.add(rock);
                env.push(rock);
            } else { // Ev
                const house = new THREE.Group();
                const base = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 4), new THREE.MeshPhongMaterial({color: 0xccaa88}));
                const roof = new THREE.Mesh(new THREE.ConeGeometry(3.5, 2, 4), new THREE.MeshPhongMaterial({color: 0x882222}));
                roof.position.y = 2.5; roof.rotation.y = Math.PI/4;
                house.add(base); house.add(roof);
                house.position.set(x, 1.5, z);
                scene.add(house);
                env.push(house);
            }
        }

        function createSnake(x, z, isPlayer) {
            const segments = isPlayer ? 5 : 20; // Rəqiblər daha yekədir
            const color = isPlayer ? 0x00f2fe : 0xff4400;
            const body = [];
            for(let i=0; i<segments; i++) {
                const seg = new THREE.Mesh(
                    new THREE.SphereGeometry(isPlayer ? 0.6 : 1.2, 16, 16),
                    new THREE.MeshPhongMaterial({color: color, emissive: color, emissiveIntensity: 0.2})
                );
                seg.position.set(x - i, 0.6, z);
                scene.add(seg);
                body.push(seg);
            }
            if(isPlayer) player = body;
            else enemies.push({body: body, dir: new THREE.Vector3(0.1, 0, 0)});
        }

        function spawnMegaEnemy() {
            createSnake(Math.random()*100-50, Math.random()*100-50, false);
        }

        function spawnFood() {
            if(food) scene.remove(food);
            food = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 16, 16),
                new THREE.MeshPhongMaterial({color: 0xff0055, emissive: 0xff0055})
            );
            food.position.set(Math.random()*100-50, 0.5, Math.random()*100-50);
            scene.add(food);
        }

        function initJoystick() {
            const zone = document.getElementById('joystick-zone');
            const stick = document.getElementById('stick');
            let active = false;

            const move = (e) => {
                if(!active) return;
                const touch = e.touches ? e.touches[0] : e;
                const rect = zone.getBoundingClientRect();
                const dx = touch.clientX - (rect.left + 70);
                const dy = touch.clientY - (rect.top + 70);
                const angle = Math.atan2(dy, dx);
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);

                stick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
                moveDir.x = Math.cos(angle) * 0.2;
                moveDir.z = Math.sin(angle) * 0.2;
            };

            zone.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchend', () => { active = false; stick.style.transform = 'translate(-50%, -50%)'; });
            window.addEventListener('touchmove', move);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            
            // FPS Hesablama
            frameCount++;
            if (time - lastTime >= 1000) {
                fps = frameCount;
                document.getElementById('fps-counter').innerText = `FPS: ${fps}`;
                frameCount = 0;
                lastTime = time;
            }

            // Oyunçu Hərəkəti (Yumşaq İlan Effekti)
            for(let i = player.length - 1; i > 0; i--) {
                player[i].position.lerp(player[i-1].position, 0.3);
            }
            player[0].position.add(moveDir);

            // Kamera Takibi
            camera.position.lerp(new THREE.Vector3(player[0].position.x, 15, player[0].position.z + 20), 0.1);
            camera.lookAt(player[0].position);

            // Yemək Yemə
            if(player[0].position.distanceTo(food.position) < 1.5) {
                score += 10;
                document.getElementById('score').innerText = score;
                spawnFood();
                growPlayer();
            }

            // Rəqiblərin hərəkəti (AI)
            enemies.forEach(en => {
                for(let i = en.body.length - 1; i > 0; i--) {
                    en.body[i].position.lerp(en.body[i-1].position, 0.1);
                }
                if(Math.random() < 0.02) en.dir.applyAxisAngle(new THREE.Vector3(0,1,0), (Math.random()-0.5));
                en.body[0].position.add(en.dir);
                
                // Rəqiblə toqquşma
                if(player[0].position.distanceTo(en.body[0].position) < 2) location.reload();
            });

            // Ətraf mühitlə toqquşma
            env.forEach(obj => {
                if(player[0].position.distanceTo(obj.position) < 2) location.reload();
            });

            renderer.render(scene, camera);
        }

        function growPlayer() {
            const last = player[player.length-1];
            const seg = new THREE.Mesh(
                new THREE.SphereGeometry(0.6, 16, 16),
                new THREE.MeshPhongMaterial({color: 0x00f2fe})
            );
            seg.position.copy(last.position);
            scene.add(seg);
            player.push(seg);
        }
    </script>
</body>
</html>
